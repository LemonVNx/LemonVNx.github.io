<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Game - L E M O N</title>
    <link rel="stylesheet" href="style.css?v=110"> 
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        #main-content { 
            display: block !important; 
            opacity: 1 !important; 
            visibility: visible !important;
            transform: none !important;
        }
        /* Style cho khung video để hợp với giao diện của bạn */
        .video-wrapper {
            background: #fff;
            border-radius: 20px;
            padding: 10px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .video-wrapper video {
            width: 100%;
            border-radius: 15px;
            display: block;
        }
        .video-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>
    <div id="main-content" class="profile-container">
        <div style="text-align: left; width: 100%; margin-bottom: 15px;">
            <a href="index.html" style="text-decoration: none; color: #007aff; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px;">
                ❮ QUAY LẠI TRANG CHỦ
            </a>
        </div>

        <div class="logo-wrapper">
            <img src="img/IMG_3541.AVIF" alt="Logo" class="main-logo">
        </div>

        <h1 class="name">L E M O N <span class="verified-icon">🍋‍🟩</span></h1>
        
        <div class="marquee-box">
            <span class="marquee-content">Chúc các bạn chơi game vui vẻ ! Chào mừng đến với trang con.</span>
        </div>

        <h2 class="section-title">DANH SÁCH BẢN MOD</h2>
        
        <div class="links">
            <a href="https://drive.google.com/file/d/1Qa59_Gn3UdTPzMgW27PXRLEyss87-LOS/view?usp=drivesdk" class="link-card-game">
                <img src="img/cf.JPG" class="game-thumb" alt="CF">
                <div class="game-meta">
                    <span class="game-title">Crossfire | Legends SKY CHEAT 🆕</span>
                    <span class="game-date">Cập nhật 14/4 ~Mua Key~</span>
                </div>
                <div class="install-btn">Install</div>
            </a>

            <div class="video-wrapper">
                <span class="video-title">🎥 Video  Hướng Dẫn Cài DNS Antiban </span>
                <video controls>
                    <source src="hd.MP4" type="video/mp4">
                    Trình duyệt của bạn không hỗ trợ xem video.
                </video>
            </div>
            </div>

        <footer class="footer"><p>© 2026 Lemon Official</p></footer>
    </div>

    <script src="script.js?v=108"></script>
    
    <script>
        const myVideo = document.querySelector('video');
        const bgMusic = document.querySelector('audio');
        if (myVideo && bgMusic) {
            myVideo.onplay = () => bgMusic.pause();
            myVideo.onpause = () => bgMusic.play();
        }
    </script>
</body>
</html>
